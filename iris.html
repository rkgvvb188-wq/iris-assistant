<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRIS — Voice Assistant</title>
<style>
  /* ============ TO RENAME THE ASSISTANT ============
     Change ASSISTANT_NAME below (search/replace "Aura" if you also want it
     changed everywhere in the UI text). That's the only edit needed.
  ============================================== */

  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root{
    --void: #07090d;
    --panel: #0d1117;
    --line: #1c2530;
    --cyan: #5ef0ff;
    --cyan-dim: #2a8a99;
    --amber: #ffb454;
    --text: #dce6ee;
    --text-dim: #6c7a89;
    --danger: #ff5e5e;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html, body{
    height:100%;
    background: var(--void);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
  }

  body{
    background-image:
      radial-gradient(circle at 50% 0%, rgba(94,240,255,0.06), transparent 60%),
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: auto, 36px 36px, 36px 36px;
  }

  .stage{
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
    padding: 28px 20px 22px;
    position:relative;
  }

  /* ---------- Header ---------- */
  .header{
    width:100%;
    max-width: 720px;
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.12em;
    color: var(--text-dim);
    text-transform:uppercase;
  }
  .brand{
    color: var(--cyan);
    font-weight:600;
    font-size:13px;
    letter-spacing:0.2em;
  }
  .clock{ font-variant-numeric: tabular-nums; }

  /* ---------- Core (signature element) ---------- */
  .core-wrap{
    position:relative;
    width: 260px;
    height: 260px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex:1;
    margin: 10px 0;
  }

  .ring{
    position:absolute;
    border-radius:50%;
    border: 1px solid var(--line);
  }
  .ring.r1{ width:100%; height:100%; }
  .ring.r2{ width:78%; height:78%; border-color: rgba(94,240,255,0.12); }
  .ring.r3{ width:56%; height:56%; border-style:dashed; border-color: rgba(94,240,255,0.18); }

  .ring.spin{ animation: spin 22s linear infinite; }
  .ring.spin-rev{ animation: spin 16s linear infinite reverse; }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  .core{
    width: 132px;
    height: 132px;
    border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #133038, var(--panel) 70%);
    border: 1px solid var(--cyan-dim);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    position:relative;
    box-shadow: 0 0 40px rgba(94,240,255,0.08), inset 0 0 30px rgba(0,0,0,0.5);
    transition: box-shadow .3s ease, border-color .3s ease, transform .15s ease;
    z-index:2;
  }
  .core:active{ transform: scale(0.97); }

  .core svg{ width:42px; height:42px; stroke: var(--cyan); transition: stroke .3s ease; }

  .core-wrap.listening .core{
    border-color: var(--cyan);
    box-shadow: 0 0 70px rgba(94,240,255,0.35), inset 0 0 30px rgba(94,240,255,0.1);
  }
  .core-wrap.listening .ring{ border-color: rgba(94,240,255,0.5); }
  .core-wrap.speaking .core{
    border-color: var(--amber);
    box-shadow: 0 0 70px rgba(255,180,84,0.3), inset 0 0 30px rgba(255,180,84,0.1);
  }
  .core-wrap.speaking .core svg{ stroke: var(--amber); }

  .pulse-bar{
    position:absolute;
    bottom:-34px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:4px;
    align-items:flex-end;
    height:18px;
  }
  .pulse-bar span{
    width:3px;
    background: var(--cyan-dim);
    border-radius:2px;
    height:4px;
    transition: height .15s ease, background .3s ease;
  }
  .core-wrap.listening .pulse-bar span{ background: var(--cyan); animation: bar 0.9s ease-in-out infinite; }
  .core-wrap.speaking .pulse-bar span{ background: var(--amber); animation: bar 0.6s ease-in-out infinite; }
  .pulse-bar span:nth-child(1){ animation-delay: 0s; }
  .pulse-bar span:nth-child(2){ animation-delay: 0.1s; }
  .pulse-bar span:nth-child(3){ animation-delay: 0.2s; }
  .pulse-bar span:nth-child(4){ animation-delay: 0.3s; }
  .pulse-bar span:nth-child(5){ animation-delay: 0.4s; }
  @keyframes bar{ 0%,100%{ height:4px; } 50%{ height:18px; } }

  .status-label{
    margin-top: 50px;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color: var(--text-dim);
    text-align:center;
    min-height: 16px;
  }
  .core-wrap.listening ~ .status-label{ color: var(--cyan); }

  /* ---------- Transcript ---------- */
  .transcript{
    width:100%;
    max-width: 640px;
    flex:0 0 auto;
    text-align:center;
    min-height: 56px;
    padding: 0 12px;
  }
  .transcript .you{ color: var(--text-dim); font-size:13px; margin-bottom:6px; }
  .transcript .reply{ color: var(--text); font-size:15px; line-height:1.5; }
  .transcript .reply .tag{ color: var(--amber); font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.1em; margin-right:6px; }

  /* ---------- Log toggle / panel ---------- */
  .log-toggle{
    position:absolute;
    top:24px;
    right:20px;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    color: var(--text-dim);
    letter-spacing:0.1em;
    background:none;
    border:1px solid var(--line);
    padding:6px 10px;
    border-radius:4px;
    cursor:pointer;
    transition: all .2s ease;
  }
  .log-toggle:hover{ border-color: var(--cyan-dim); color: var(--cyan); }

  .log-panel{
    position:fixed;
    top:0; right:0;
    width: 320px;
    max-width: 85vw;
    height:100%;
    background: var(--panel);
    border-left: 1px solid var(--line);
    transform: translateX(100%);
    transition: transform .3s ease;
    z-index: 10;
    display:flex;
    flex-direction:column;
    padding: 20px 16px;
  }
  .log-panel.open{ transform: translateX(0); }
  .log-panel h3{ font-size:12px; letter-spacing:0.12em; text-transform:uppercase; color:var(--cyan); margin-bottom:14px; font-family:'JetBrains Mono',monospace;}
  .log-entries{ flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; font-size:12px; }
  .log-entries::-webkit-scrollbar{ width:4px; }
  .log-entries::-webkit-scrollbar-thumb{ background: var(--line); border-radius:4px; }
  .log-entry .who{ font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.1em; color:var(--text-dim); text-transform:uppercase; }
  .log-entry.user .who{ color: var(--cyan); }
  .log-entry.assistant .who{ color: var(--amber); }
  .log-entry p{ color:var(--text); line-height:1.4; margin-top:2px; }
  .log-empty{ color: var(--text-dim); font-size:12px; font-style:italic; }
  .clear-log{
    margin-top:12px;
    background:none; border:1px solid var(--line); color:var(--text-dim);
    font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.1em;
    padding:8px; border-radius:4px; cursor:pointer; text-transform:uppercase;
  }
  .clear-log:hover{ border-color: var(--danger); color: var(--danger); }

  /* ---------- Footer / commands hint ---------- */
  .footer{
    width:100%;
    max-width: 720px;
    display:flex;
    justify-content:center;
    gap: 18px;
    flex-wrap:wrap;
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing:0.06em;
    color: var(--text-dim);
  }
  .footer span{ white-space:nowrap; }
  .footer b{ color: var(--cyan-dim); font-weight:500; }

  .mic-error{
    position:absolute;
    bottom: 70px;
    left:50%;
    transform:translateX(-50%);
    background: rgba(255,94,94,0.1);
    border:1px solid rgba(255,94,94,0.4);
    color: var(--danger);
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    padding:8px 14px;
    border-radius:6px;
    max-width: 86%;
    text-align:center;
    display:none;
  }
  .mic-error.show{ display:block; }

  @media (max-width: 480px){
    .core-wrap{ width:200px; height:200px; }
    .core{ width:104px; height:104px; }
    .footer{ display:none; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="header">
    <div class="brand">◆ IRIS</div>
    <div class="clock" id="clock">--:--:--</div>
  </div>

  <button class="log-toggle" id="logToggle">LOG</button>

  <div class="core-wrap" id="coreWrap">
    <div class="ring r1 spin"></div>
    <div class="ring r2 spin-rev"></div>
    <div class="ring r3"></div>
    <div class="core" id="coreBtn" title="Tap to talk">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
        <line x1="12" y1="19" x2="12" y2="23"></line>
        <line x1="8" y1="23" x2="16" y2="23"></line>
      </svg>
    </div>
    <div class="pulse-bar">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>
  <div class="status-label" id="statusLabel">Tap the core to speak</div>

  <div class="transcript" id="transcript"></div>

  <div class="footer">
    <span>"<b>samay kya hai</b>" — time</span>
    <span>"<b>5 minute ka timer</b>" — timer</span>
    <span>"<b>note karo ...</b>" — save note</span>
    <span>"<b>mere notes padho</b>" — read notes</span>
    <span>"<b>... search karo</b>" — web search</span>
    <span>"<b>calculate ...</b>" — math</span>
  </div>

  <div class="mic-error" id="micError"></div>
</div>

<div class="log-panel" id="logPanel">
  <h3>Conversation Log</h3>
  <div class="log-entries" id="logEntries">
    <div class="log-empty">Abhi tak koi baatcheet nahi hui.</div>
  </div>
  <button class="clear-log" id="clearLog">Clear Log</button>
</div>

<script>
(function(){
  const ASSISTANT_NAME = "Iris"; // <-- change this to rename

  // ---------- Elements ----------
  const coreBtn = document.getElementById('coreBtn');
  const coreWrap = document.getElementById('coreWrap');
  const statusLabel = document.getElementById('statusLabel');
  const transcript = document.getElementById('transcript');
  const clockEl = document.getElementById('clock');
  const micError = document.getElementById('micError');
  const logToggle = document.getElementById('logToggle');
  const logPanel = document.getElementById('logPanel');
  const logEntries = document.getElementById('logEntries');
  const clearLogBtn = document.getElementById('clearLog');

  // ---------- Clock ----------
  function tickClock(){
    const d = new Date();
    clockEl.textContent = d.toLocaleTimeString('hi-IN', { hour: '2-digit', minute:'2-digit', second:'2-digit' });
  }
  tickClock();
  setInterval(tickClock, 1000);

  // ---------- Notes (in-memory, session only) ----------
  let notes = [];

  // ---------- Conversation log (in-memory) ----------
  let history = []; // {role, content}

  function addLog(role, text){
    if(logEntries.querySelector('.log-empty')) logEntries.innerHTML = '';
    const entry = document.createElement('div');
    entry.className = 'log-entry ' + role;
    entry.innerHTML = `<div class="who">${role === 'user' ? 'You' : ASSISTANT_NAME}</div><p></p>`;
    entry.querySelector('p').textContent = text;
    logEntries.appendChild(entry);
    logEntries.scrollTop = logEntries.scrollHeight;
  }

  logToggle.addEventListener('click', () => logPanel.classList.toggle('open'));
  clearLogBtn.addEventListener('click', () => {
    logEntries.innerHTML = '<div class="log-empty">Abhi tak koi baatcheet nahi hui.</div>';
    history = [];
  });

  // ---------- Speech Synthesis (TTS) ----------
  let voices = [];
  function loadVoices(){ voices = window.speechSynthesis.getVoices(); }
  loadVoices();
  if (typeof speechSynthesis !== 'undefined') {
    speechSynthesis.onvoiceschanged = loadVoices;
  }

  function pickFemaleVoice(){
    // Try Hindi female first, then any female-sounding English voice, then fallback
    const hindi = voices.find(v => /hi-IN/i.test(v.lang) && /female|woman/i.test(v.name));
    if (hindi) return hindi;
    const hindiAny = voices.find(v => /hi-IN/i.test(v.lang));
    if (hindiAny) return hindiAny;
    const femaleNames = ['Female','Samantha','Zira','Google US English','Microsoft Zira','Susan','Karen','Moira','Tessa'];
    for (const name of femaleNames){
      const v = voices.find(v => v.name.includes(name));
      if (v) return v;
    }
    return voices[0] || null;
  }

  function speak(text){
    return new Promise((resolve) => {
      if (!('speechSynthesis' in window)) { resolve(); return; }
      speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      const v = pickFemaleVoice();
      if (v) utter.voice = v;
      utter.pitch = 1.15;
      utter.rate = 1.0;
      utter.lang = (v && v.lang) ? v.lang : 'en-US';
      utter.onstart = () => { coreWrap.classList.add('speaking'); statusLabel.textContent = ASSISTANT_NAME + ' bol rahi hai...'; };
      utter.onend = () => { coreWrap.classList.remove('speaking'); statusLabel.textContent = 'Tap the core to speak'; resolve(); };
      utter.onerror = () => { coreWrap.classList.remove('speaking'); resolve(); };
      speechSynthesis.speak(utter);
    });
  }

  // ---------- Speech Recognition (STT) ----------
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;
  let isListening = false;

  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = 'hi-IN'; // Hindi recognition; understands mixed Hinglish reasonably well

    recognition.onstart = () => {
      isListening = true;
      coreWrap.classList.add('listening');
      statusLabel.textContent = 'Sun rahi hoon...';
      micError.classList.remove('show');
    };

    recognition.onend = () => {
      isListening = false;
      coreWrap.classList.remove('listening');
    };

    recognition.onerror = (e) => {
      isListening = false;
      coreWrap.classList.remove('listening');
      statusLabel.textContent = 'Tap the core to speak';
      if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
        showMicError('Microphone access allow karein browser settings mein.');
      } else if (e.error === 'no-speech') {
        showMicError('Kuch sunayi nahi diya. Phir try karein.');
      } else {
        showMicError('Recognition error: ' + e.error);
      }
    };

    recognition.onresult = (e) => {
      const said = e.results[0][0].transcript;
      handleUserInput(said);
    };
  }

  function showMicError(msg){
    micError.textContent = msg;
    micError.classList.add('show');
    setTimeout(() => micError.classList.remove('show'), 4000);
  }

  coreBtn.addEventListener('click', () => {
    if (!recognition) {
      showMicError('Is browser mein voice recognition support nahi hai. Chrome try karein.');
      return;
    }
    if (isListening) {
      recognition.stop();
      return;
    }
    speechSynthesis.cancel();
    try {
      recognition.start();
    } catch (err) {
      // recognition already started edge case
    }
  });

  // ---------- Transcript display ----------
  function showTranscript(youSaid, reply){
    transcript.innerHTML = `
      <div class="you">"${escapeHtml(youSaid)}"</div>
      <div class="reply"><span class="tag">${ASSISTANT_NAME}</span>${escapeHtml(reply)}</div>
    `;
  }
  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // ---------- Command handling ----------
  async function handleUserInput(text){
    addLog('user', text);
    statusLabel.textContent = 'Soch rahi hoon...';

    const lower = text.toLowerCase().trim();
    let reply = null;

    // 1. Time
    if (/samay|time kya|what.?s the time|current time/.test(lower)) {
      const now = new Date();
      reply = `Abhi samay hai ${now.toLocaleTimeString('hi-IN', {hour:'2-digit', minute:'2-digit'})}.`;
    }
    // 2. Date
    else if (/(aaj|today).*(tarikh|date)|date kya/.test(lower)) {
      const now = new Date();
      reply = `Aaj ki tarikh hai ${now.toLocaleDateString('hi-IN', { day:'numeric', month:'long', year:'numeric' })}.`;
    }
    // 3. Timer: "X minute/second ka timer" or "set a timer for X minutes"
    else if (/timer/.test(lower)) {
      const match = lower.match(/(\d+)\s*(minute|min|second|sec|ghanta|hour)/);
      if (match) {
        const num = parseInt(match[1]);
        const unit = match[2];
        let seconds = num;
        if (/min/.test(unit)) seconds = num * 60;
        else if (/hour|ghanta/.test(unit)) seconds = num * 3600;
        reply = `Theek hai, ${num} ${unit} ka timer laga rahi hoon.`;
        // fire timer tool
        window.__pendingTimer = { seconds, label: text };
      } else {
        reply = 'Kitne der ka timer lagana hai? Jaise "5 minute ka timer".';
      }
    }
    // 4. Alarm
    else if (/alarm/.test(lower)) {
      reply = 'Abhi main is window se seedha alarm set nahi kar sakti, lekin aap mujhse chat mein "alarm lagao" likh kar bhi keh sakte hain.';
    }
    // 5. Notes: save
    else if (/note kar|note karo|likh lo|yaad rakho/.test(lower)) {
      const noteText = text.replace(/.*?(note kar lo|note karo|likh lo|yaad rakho)/i, '').trim() || text;
      notes.push(noteText);
      reply = `Note save kar diya: "${noteText}"`;
    }
    // 6. Notes: read
    else if (/(mere|sare|saare)?\s*notes\s*(padho|sunao|batao)/.test(lower)) {
      if (notes.length === 0) {
        reply = 'Abhi koi note save nahi hai.';
      } else {
        reply = `Aapke ${notes.length} notes hain: ` + notes.map((n,i) => `${i+1}. ${n}`).join('. ');
      }
    }
    // 7. Calculator
    else if (/calculate|jod|ghata|guna|bhag|\d+\s*[\+\-\*x×÷\/]\s*\d+/.test(lower)) {
      const expr = lower
        .replace(/calculate/g, '')
        .replace(/jod/g, '+')
        .replace(/ghata/g, '-')
        .replace(/guna/g, '*')
        .replace(/bhag/g, '/')
        .replace(/x|×/g, '*')
        .replace(/÷/g, '/')
        .match(/[\d+\-*/.()\s]+/);
      if (expr) {
        try {
          // eslint-disable-next-line no-eval
          const result = Function('"use strict";return (' + expr[0] + ')')();
          reply = `Jawab hai ${result}.`;
        } catch (e) {
          reply = 'Yeh calculation samajh nahi paayi, dobara try karein.';
        }
      } else {
        reply = 'Kya calculate karna hai, thoda clearly bolein?';
      }
    }
    // 8. Web search
    else if (/search karo|google karo|search for/.test(lower)) {
      const query = text.replace(/.*?(search karo|google karo|search for)/i, '').trim();
      if (query) {
        window.open('https://www.google.com/search?q=' + encodeURIComponent(query), '_blank');
        reply = `"${query}" search kar rahi hoon, naye tab mein khol diya.`;
      } else {
        reply = 'Kya search karna hai?';
      }
    }
    // 9. Open common sites/apps
    else if (/youtube khol/.test(lower)) { window.open('https://youtube.com','_blank'); reply = 'YouTube khol diya.'; }
    else if (/gmail khol/.test(lower)) { window.open('https://mail.google.com','_blank'); reply = 'Gmail khol diya.'; }
    else if (/(maps|naksha) khol/.test(lower)) { window.open('https://maps.google.com','_blank'); reply = 'Maps khol diya.'; }

    // 10. Greeting / identity
    else if (/tumhara naam|aapka naam|who are you|tum kaun ho/.test(lower)) {
      reply = `Main ${ASSISTANT_NAME} hoon, aapki voice assistant. Bataiye, kaise madad karoon?`;
    }
    else if (/^(hi|hello|hey|namaste|namaskar)/.test(lower)) {
      reply = `Namaste! Main ${ASSISTANT_NAME} hoon. Kya madad kar sakti hoon?`;
    }

    // 11. Fallback -> Claude API for general Q&A
    if (reply === null) {
      reply = await askClaude(text);
    }

    showTranscript(text, reply);
    addLog('assistant', reply);
    await speak(reply);

    if (window.__pendingTimer) {
      // Note: actual timer firing is handled outside this artifact's sandbox in real use;
      // here we simulate using setTimeout + a spoken alert.
      const { seconds, label } = window.__pendingTimer;
      window.__pendingTimer = null;
      setTimeout(async () => {
        const msg = `Timer khatam ho gaya: ${label}`;
        showTranscript('(timer)', msg);
        addLog('assistant', msg);
        await speak(msg);
      }, seconds * 1000);
    }
  }

  // ---------- Claude API fallback for open-ended questions ----------
  async function askClaude(userText) {
    statusLabel.textContent = 'Soch rahi hoon...';
    history.push({ role: 'user', content: userText });
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          system: `Tum ${ASSISTANT_NAME} ho, ek friendly Hindi/Hinglish voice assistant jaisa JARVIS. Hamesha chhota, natural, bolchaal wala jawab do (2-3 sentences se zyada nahi, kyunki yeh bola jaayega zor se). Hindi ya Hinglish mein jawab do jaisa user ne pucha.`,
          messages: history.slice(-8)
        })
      });
      const data = await response.json();
      const textBlock = (data.content || []).find(c => c.type === 'text');
      const reply = textBlock ? textBlock.text : 'Maaf kijiye, jawab nahi mil paaya.';
      history.push({ role: 'assistant', content: reply });
      return reply;
    } catch (err) {
      console.error('Claude API error:', err);
      return 'Mujhe jawab dene mein dikkat ho rahi hai. Internet connection check karein.';
    }
  }

  // ---------- Initial greeting hint ----------
  statusLabel.textContent = 'Tap the core to speak';

})();
